controller_manager:
    ros__parameters:
      update_rate: 100
      use_sim_time: true

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster
      
      diff_drive_controller:
        type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["base_to_left_wheel_joint"]
    right_wheel_names: ["base_to_right_wheel_joint"]
    
    wheel_separation: 0.306
    wheel_radius: 0.5
    
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"
    
    cmd_vel_timeout: 0.5
    enable_odom_tf: true